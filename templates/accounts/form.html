{% extends "base.html" %}

{% block title %}{{ "Edit" if account else "Create" }} Account — SAP Onboarding{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "Edit Account" if account else "Create Account" }}</h1>
    <a href="{{ url_for('accounts.list_accounts') }}" class="btn btn-secondary">← Back to List</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('accounts.edit_account', account_id=account.id) if account else url_for('accounts.create_account') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ account.username if account else '' }}" required placeholder="john.smith">
        </div>

        <div class="form-group">
            <label for="system_name">System</label>
            <select id="system_name" name="system_name" required>
                <option value="">Select system</option>
                <option value="email" {{ 'selected' if account and account.system_name == 'email' else '' }}>📧 Email</option>
                <option value="jira" {{ 'selected' if account and account.system_name == 'jira' else '' }}>📋 Jira</option>
                <option value="gitlab" {{ 'selected' if account and account.system_name == 'gitlab' else '' }}>🦊 GitLab</option>
                <option value="slack" {{ 'selected' if account and account.system_name == 'slack' else '' }}>💬 Slack</option>
                <option value="vpn" {{ 'selected' if account and account.system_name == 'vpn' else '' }}>🔒 VPN</option>
            </select>
        </div>

        <div class="form-group">
            <label for="permissions">Permissions</label>
            <select id="permissions" name="permissions" required>
                <option value="read" {{ 'selected' if account and account.permissions == 'read' else '' }}>Read</option>
                <option value="write" {{ 'selected' if account and account.permissions == 'write' else '' }}>Write</option>
                <option value="admin" {{ 'selected' if account and account.permissions == 'admin' else '' }}>Admin</option>
            </select>
        </div>

        <div class="form-group form-group-checkbox">
            <label>
                <input type="checkbox" id="is_active" name="is_active" {{ 'checked' if account and account.is_active else '' }}>
                <span>Active</span>
            </label>
        </div>

        <div class="form-group">
            <label for="employee_id">Employee</label>
            <select id="employee_id" name="employee_id" required>
                <option value="">Select employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}" {{ 'selected' if account and account.employee_id == emp.id else '' }}>{{ emp.name }} ({{ emp.email }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ "Save Changes" if account else "Create" }}</button>
            <a href="{{ url_for('accounts.list_accounts') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
