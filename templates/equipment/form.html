{% extends "base.html" %}

{% block title %}{{ "Edit" if equipment else "Add" }} Equipment — SAP Onboarding{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "Edit Equipment" if equipment else "Add Equipment" }}</h1>
    <a href="{{ url_for('equipment.list_equipment') }}" class="btn btn-secondary">← Back to List</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('equipment.edit_equipment', equipment_id=equipment.id) if equipment else url_for('equipment.create_equipment') }}">
        <div class="form-group">
            <label for="serial_number">Serial Number</label>
            <input type="text" id="serial_number" name="serial_number" value="{{ equipment.serial_number if equipment else '' }}" required placeholder="SN-2024-001">
        </div>

        <div class="form-group">
            <label for="equipment_type">Equipment Type</label>
            <select id="equipment_type" name="equipment_type" required>
                <option value="">Select type</option>
                <option value="laptop" {{ 'selected' if equipment and equipment.equipment_type == 'laptop' else '' }}>💻 Laptop</option>
                <option value="monitor" {{ 'selected' if equipment and equipment.equipment_type == 'monitor' else '' }}>🖥️ Monitor</option>
                <option value="keyboard" {{ 'selected' if equipment and equipment.equipment_type == 'keyboard' else '' }}>⌨️ Keyboard</option>
                <option value="mouse" {{ 'selected' if equipment and equipment.equipment_type == 'mouse' else '' }}>🖱️ Mouse</option>
                <option value="headset" {{ 'selected' if equipment and equipment.equipment_type == 'headset' else '' }}>🎧 Headset</option>
            </select>
        </div>

        <div class="form-group">
            <label for="model">Model</label>
            <input type="text" id="model" name="model" value="{{ equipment.model if equipment else '' }}" required placeholder="MacBook Pro 16 M3">
        </div>

        <div class="form-group">
            <label for="employee_id">Assigned Employee</label>
            <select id="employee_id" name="employee_id" required>
                <option value="">Select employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}" {{ 'selected' if equipment and equipment.employee_id == emp.id else '' }}>{{ emp.name }} ({{ emp.email }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ "Save Changes" if equipment else "Add" }}</button>
            <a href="{{ url_for('equipment.list_equipment') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
