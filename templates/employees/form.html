{% extends "base.html" %}

{% block title %}{{ "Edit" if employee else "Add" }} Employee — SAP Onboarding{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "Edit Employee" if employee else "Add Employee" }}</h1>
    <a href="{{ url_for('employees.list_employees') }}" class="btn btn-secondary">← Back to List</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('employees.edit_employee', employee_id=employee.id) if employee else url_for('employees.create_employee') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" value="{{ employee.name if employee else '' }}" required placeholder="John Smith">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ employee.email if employee else '' }}" required placeholder="john.smith@company.com">
        </div>

        <div class="form-group">
            <label for="position">Position</label>
            <input type="text" id="position" name="position" value="{{ employee.position if employee else '' }}" required placeholder="Software Engineer">
        </div>

        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" value="{{ employee.start_date if employee else '' }}" required>
        </div>

        <div class="form-group">
            <label for="status">Onboarding Status</label>
            <select id="status" name="status" required>
                <option value="pending" {{ 'selected' if employee and employee.status == 'pending' else '' }}>Pending</option>
                <option value="in_progress" {{ 'selected' if employee and employee.status == 'in_progress' else '' }}>In Progress</option>
                <option value="completed" {{ 'selected' if employee and employee.status == 'completed' else '' }}>Completed</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ "Save Changes" if employee else "Create" }}</button>
            <a href="{{ url_for('employees.list_employees') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
